<div class="focused-shell">

  <!-- Exit to Shell button — top-left, minimal -->
  <button
    class="exit-btn"
    type="button"
    (click)="exitToShell()"
    aria-label="Exit to main shell"
    title="Exit focused mode">
    <i class="fas fa-arrow-left exit-icon"></i>
    <span class="exit-label">Shell</span>
  </button>

  <!-- AXOS watermark — bottom-right -->
  <span class="focused-watermark" aria-hidden="true">AXOS OS</span>

  <!-- Full-screen content outlet -->
  <div class="focused-content">
    <router-outlet></router-outlet>
  </div>

</div>
