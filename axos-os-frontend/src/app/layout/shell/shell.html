<div class="layout" [class.collapsed]="collapsed">
  <div class="app-ambient" aria-hidden="true">
    <span class="ambient-orb orb-a"></span>
    <span class="ambient-orb orb-b"></span>
    <span class="ambient-orb orb-c"></span>
    <span class="ambient-beam beam-a"></span>
    <span class="ambient-beam beam-b"></span>
    <span class="ambient-grid"></span>
  </div>

  <aside class="sidebar">
    <video autoplay loop muted playsinline class="sidebar-ambient-video"><source src="assets/login/system-atmosphere.mp4" type="video/mp4"></video>
    <div class="sidebar-noise" aria-hidden="true"></div>

    <div class="brand">
      <div class="brand-mark" aria-hidden="true">AX</div>
      <div class="brand-text">
        <strong>AXOS OS</strong>
        <small>Industrial Operating System</small>
      </div>
      <button class="toggle-btn" (click)="toggle()" [attr.aria-label]="collapsed ? 'Expandir' : 'Colapsar'">
        <i class="fas" [class.fa-chevron-left]="!collapsed" [class.fa-chevron-right]="collapsed"></i>
      </button>
    </div>

    <nav>
      <div class="nav-group" [class.open]="openSection === group.id" *ngFor="let group of navGroups">
        <button class="nav-group-header" (click)="toggleSection(group.id)">
          <span class="nav-group-label">
            <i class="fas nav-icon" [class]="'fas ' + group.icon + ' nav-icon'"></i>
            <span class="nav-full">{{ group.label }}</span>
            <span class="nav-short">{{ group.short }}</span>
          </span>
          <span class="nav-full group-arrow"><i class="fas fa-chevron-down"></i></span>
        </button>
        <div class="nav-group-items">
          <a
            *ngFor="let item of group.items"
            [routerLink]="item.route"
            routerLinkActive="active"
            [class.state-planned]="item.state === 'planned'"
            [class.state-partial]="item.state === 'partial'"
            [attr.title]="item.note || stateLabel(item.state)">
            <i class="fas" [class]="'fas ' + item.icon"></i>
            <span class="item-label">{{ item.label }}</span>
            <span class="item-status nav-full" [class]="'status-' + item.state">{{ stateLabel(item.state) }}</span>
          </a>
        </div>
      </div>
    </nav>

    <button class="logout" (click)="logout()">
      <i class="fas fa-sign-out-alt nav-icon"></i>
      <span class="nav-full">Cerrar sesion</span>
      <span class="nav-short">X</span>
    </button>
  </aside>

  <div class="shell-main">
    <div class="shell-main-overlay" aria-hidden="true"></div>

    <header class="topbar">
      <button class="menu-trigger" (click)="toggle()" aria-label="Alternar menu"><i class="fas fa-bars"></i></button>

      <div class="search-wrapper" #searchWrapper>
        <label class="search" aria-label="Buscar modulo">
          <i class="fas fa-search search-icon"></i>
          <input
            #searchInput
            type="search"
            placeholder="Buscar módulo, kit, modelo, NP o publicación"
            [ngModel]="searchTerm"
            (ngModelChange)="onSearchChange($event)"
            (focus)="onSearchFocus()"
          />
          <span class="search-hint nav-full">⌘K</span>
        </label>
        <div class="search-results" *ngIf="showSearchResults">
          <button type="button" class="search-result" *ngFor="let result of searchResults" (click)="openSearchResult(result)">
            <span class="result-main">{{ result.label }}</span>
            <span class="result-meta">{{ result.category }} <small *ngIf="result.subtitle">· {{ result.subtitle }}</small></span>
          </button>
          <div class="search-empty" *ngIf="!searchResults.length">Sin resultados.</div>
        </div>
      </div>


      <div class="context-strip nav-full" *ngIf="enterpriseContext.buildings().length || enterpriseContext.programs().length">
        <select [ngModel]="enterpriseContext.context().buildingId || ''" (ngModelChange)="onContextChange('buildingId', $event)">
          <option value="">Building: Todos</option>
          <option *ngFor="let b of enterpriseContext.buildings()" [value]="b.id">{{ b.code }} · {{ b.name }}</option>
        </select>
        <select [ngModel]="enterpriseContext.context().programId || ''" (ngModelChange)="onContextChange('programId', $event)">
          <option value="">Programa: Todos</option>
          <option *ngFor="let p of enterpriseContext.programs()" [value]="p.id">{{ p.code }} · {{ p.name }}</option>
        </select>
        <select [ngModel]="enterpriseContext.context().lineId || ''" (ngModelChange)="onContextChange('lineId', $event)">
          <option value="">Línea: Todas</option>
          <option *ngFor="let l of enterpriseContext.lines()" [value]="l.id">{{ l.code }} · {{ l.name }}</option>
        </select>
        <button type="button" class="ctx-clear" (click)="clearEnterpriseContext()">Limpiar</button>
      </div>

      <div class="topbar-actions">
        <div class="action-wrap" #notificationsWrap>
          <button class="icon-btn glass-btn" aria-label="Notificaciones" (click)="toggleNotifications()">
            <i class="far fa-bell"></i>
            <span class="notif-dot" *ngIf="notifications.length"></span>
          </button>
          <div class="notif-panel" *ngIf="showNotifications">
            <div class="panel-head">
              <strong>Notificaciones</strong>
              <button type="button" class="link-btn" (click)="clearNotifications()">Limpiar todo</button>
            </div>
            <div class="panel-empty" *ngIf="!notifications.length">Sin notificaciones activas.</div>
            <article class="notif-item" *ngFor="let item of notifications">
              <span class="notif-type">{{ notificationTypeLabel(item.type) }}</span>
              <p>{{ item.message }}</p>
              <small>{{ formatTimestamp(item.createdAt) }}</small>
            </article>
          </div>
        </div>

        <div class="action-wrap" #userWrap>
          <button class="icon-btn glass-btn" aria-label="Perfil de usuario" (click)="toggleUserPanel()">
            <i class="far fa-user-circle"></i>
          </button>
          <div class="user-panel" *ngIf="showUserPanel">
            <strong>Sergio</strong>
            <small>Planner / IE</small>
            <button type="button" class="btn-user-logout" (click)="logout()">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="content-frame">
        <div class="frame-topline" aria-hidden="true"></div>
        <div class="content-glow content-glow-a" aria-hidden="true"></div>
        <div class="content-glow content-glow-b" aria-hidden="true"></div>
        <router-outlet></router-outlet>
      </section>
    </main>
  </div>
</div>
<app-confirm-modal></app-confirm-modal>
