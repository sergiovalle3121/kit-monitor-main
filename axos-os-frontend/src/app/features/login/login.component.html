<div class="login-shell">
  <!-- Pure CSS animated background — no video -->
  <div class="login-bg-net" aria-hidden="true"></div>
  <div class="login-bg-overlay" aria-hidden="true"></div>

  <div class="login-card">
    <!-- Left: Brand Panel -->
    <section class="login-hero">
      <div class="hero-logo-frame">
        <img src="assets/login/axos-os-original.svg" alt="AXOS OS" class="hero-logo" />
      </div>
      
      <h1>AXOS OS</h1>
      <p class="hero-subline">Industrial Operating System — Mission Critical.</p>

      <div class="hero-pills">
        <span>◉ Multi-department</span>
        <span>∿ Real-time</span>
        <span>⌁ Traceability</span>
      </div>
    </section>

    <!-- Right: Form Panel -->
    <section class="login-panel">
      <div class="panel-head">
        <span class="panel-kicker">Acceso seguro</span>
        <h2>Iniciar sesión</h2>
        <p>Ingresa con tu cuenta operativa para continuar en AXOS OS.</p>
      </div>

      <form (ngSubmit)="submit()" class="login-form" [attr.aria-busy]="loading">
        <label class="field">
          <span>Usuario o email</span>
          <div class="field-shell">
            <i class="fas fa-user field-ico"></i>
            <input
              type="text"
              [(ngModel)]="email"
              name="email"
              required
              autocomplete="username"
              placeholder="3312793"
              id="login-email" />
          </div>
        </label>

        <label class="field">
          <span>Contraseña</span>
          <div class="field-shell">
            <i class="fas fa-lock field-ico"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="Ingresa tu contraseña"
              id="login-password" />
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              <i class="fas {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
            </button>
          </div>
        </label>

        @if (error) {
          <p class="error"><i class="fas fa-circle-exclamation"></i> {{ error }}</p>
        }

        <button type="submit" [disabled]="loading" id="btn-submit-login">
          @if (loading) {
            <span class="spin-ring"></span> Entrando...
          } @else {
            Entrar a AXOS OS <i class="fas fa-arrow-right"></i>
          }
        </button>
      </form>
    </section>

    <!-- Close Button -->
    <button class="close-btn" (click)="cancel()">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
