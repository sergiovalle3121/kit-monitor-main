<div class="module-placeholder">
  <header class="placeholder-header">
    <div class="breadcrumb">
      <span>{{ domainTitle() }}</span>
      <i class="fas fa-chevron-right"></i>
      <strong>{{ title() }}</strong>
    </div>
    <div class="context-info" *ngIf="buildingCode() || programCode()">
      <span class="pill" *ngIf="buildingCode()"><i class="fas fa-building"></i> {{ buildingCode() }}</span>
      <span class="pill" *ngIf="programCode()"><i class="fas fa-microchip"></i> {{ programCode() }}</span>
    </div>
  </header>

  <main class="placeholder-content">
    <div class="empty-state">
      <div class="icon-orb">
        <i class="fas fa-layer-group"></i>
      </div>
      <h2>{{ title() }}</h2>
      <p>Este módulo está activo en la topología de <strong>AXOS OS</strong>, pero no tiene registros operativos para el contexto seleccionado.</p>
      
      <div class="actions">
        <button class="primary-btn">
          <i class="fas fa-plus"></i> Inicializar registros
        </button>
        <button class="secondary-btn" routerLink="/dashboard">
          Ir al Dashboard
        </button>
      </div>
    </div>

    <div class="tech-specs">
      <div class="spec">
        <label>Domain Path</label>
        <code>/{{ domain() }}/{{ module() }}</code>
      </div>
      <div class="spec">
        <label>Module Status</label>
        <span class="status-badge">Standby</span>
      </div>
    </div>
  </main>
</div>
