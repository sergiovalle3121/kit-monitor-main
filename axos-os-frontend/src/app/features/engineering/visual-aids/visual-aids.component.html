<div class="eng-editor-container">
  <!-- Toolbar -->
  <header class="eng-toolbar">
    <div class="doc-info">
      <div class="icon-circle">
        <i class="fas fa-layer-group"></i>
      </div>
      <div class="title-meta">
        <h2>{{ currentDoc()?.name }}</h2>
        <span class="badge">Visual Aid Editor</span>
      </div>
    </div>

    <div class="tool-group main-tools">
      <button class="tool-btn" [class.active]="activeTool() === 'SELECT'" (click)="setTool('SELECT')" title="Select (V)">
        <i class="fas fa-mouse-pointer"></i>
      </button>
      <button class="tool-btn" (click)="addRect()" title="Rectangle (R)">
        <i class="far fa-square"></i>
      </button>
      <button class="tool-btn" (click)="addCircle()" title="Circle (C)">
        <i class="far fa-circle"></i>
      </button>
      <button class="tool-btn" (click)="addLine()" title="Line (L)">
        <i class="fas fa-minus"></i>
      </button>
      <button class="tool-btn" (click)="addText()" title="Text (T)">
        <i class="fas fa-font"></i>
      </button>
      <div class="divider"></div>
      <label class="tool-btn upload-btn" title="Upload Image">
        <i class="fas fa-image"></i>
        <input type="file" (change)="onImageUpload($event)" accept="image/*" hidden>
      </label>
    </div>

    <div class="spacer"></div>

    <div class="actions">
      <div class="status-indicator">
        <span class="status-dot" [class.modified]="isModified()"></span>
        <span class="status-text">{{ isModified() ? 'Cambios sin guardar' : 'Guardado' }}</span>
      </div>
      <button class="btn-save" (click)="save()">
        <i class="fas fa-cloud-upload-alt"></i> Publicar Diseño
      </button>
    </div>
  </header>

  <div class="editor-main-layout">
    <!-- Sidebar: Assets & Layers -->
    <aside class="eng-sidebar">
      <div class="sidebar-tabs">
        <button class="tab active">Elementos</button>
        <button class="tab">Capas</button>
      </div>
      
      <div class="sidebar-content">
        <section class="asset-section">
          <h3>Formas Básicas</h3>
          <div class="asset-grid">
            <div class="asset-item" (click)="addRect()">
              <div class="shape-preview rect"></div>
              <span>Rect</span>
            </div>
            <div class="asset-item" (click)="addCircle()">
              <div class="shape-preview circle"></div>
              <span>Circle</span>
            </div>
          </div>
        </section>

        <section class="asset-section">
          <h3>Señalética Industrial</h3>
          <div class="asset-grid">
            <div class="asset-item warning">
              <i class="fas fa-exclamation-triangle"></i>
              <span>Peligro</span>
            </div>
            <div class="asset-item info">
              <i class="fas fa-info-circle"></i>
              <span>Info</span>
            </div>
            <div class="asset-item arrow">
              <i class="fas fa-long-arrow-alt-right"></i>
              <span>Flecha</span>
            </div>
          </div>
        </section>
      </div>
    </aside>

    <!-- Main Canvas Stage -->
    <main class="eng-canvas-area">
      <div class="canvas-ruler horizontal"></div>
      <div class="canvas-ruler vertical"></div>
      <div class="canvas-viewport">
        <div class="canvas-shadow-box">
          <canvas #canvasElement></canvas>
        </div>
      </div>
    </main>

    <!-- Properties Panel -->
    <aside class="eng-properties">
      <div class="panel-header">
        <h3>Propiedades</h3>
      </div>
      
      <div class="panel-content" *ngIf="selectedObject(); else noSelection">
        <section class="prop-group">
          <label>Estilo</label>
          <div class="prop-row">
            <div class="color-input">
              <input type="color" [ngModel]="selectedObject().fill" (ngModelChange)="updateProperty('fill', $event)">
              <span>Relleno</span>
            </div>
            <div class="color-input">
              <input type="color" [ngModel]="selectedObject().stroke" (ngModelChange)="updateProperty('stroke', $event)">
              <span>Borde</span>
            </div>
          </div>
        </section>

        <section class="prop-group">
          <label>Grosor de Borde ({{ selectedObject().strokeWidth }}px)</label>
          <input type="range" min="0" max="20" [ngModel]="selectedObject().strokeWidth" (ngModelChange)="updateProperty('strokeWidth', $event)">
        </section>

        <section class="prop-group">
          <label>Opacidad ({{ selectedObject().opacity * 100 | number:'1.0-0' }}%)</label>
          <input type="range" min="0" max="1" step="0.1" [ngModel]="selectedObject().opacity" (ngModelChange)="updateProperty('opacity', $event)">
        </section>

        <section class="prop-group" *ngIf="selectedObject().type === 'i-text'">
          <label>Texto</label>
          <div class="prop-row">
            <select [ngModel]="selectedObject().fontFamily" (ngModelChange)="updateProperty('fontFamily', $event)">
              <option value="Inter">Inter</option>
              <option value="Roboto">Roboto</option>
              <option value="monospace">Monospace</option>
            </select>
            <input type="number" [ngModel]="selectedObject().fontSize" (ngModelChange)="updateProperty('fontSize', $event)" style="width: 60px">
          </div>
        </section>

        <div class="danger-zone">
          <button class="btn-delete" (click)="deleteSelected()">
            <i class="fas fa-trash-alt"></i> Eliminar Objeto
          </button>
        </div>
      </div>

      <ng-template #noSelection>
        <div class="no-selection-msg">
          <i class="fas fa-mouse-pointer"></i>
          <p>Selecciona un elemento para editar sus propiedades</p>
        </div>
      </ng-template>
    </aside>
  </div>
</div>
