<div class="editor-wrap">

  <!-- Toolbar placeholder -->
  <div class="editor-toolbar">
    <div class="toolbar-group">
      <span class="toolbar-badge">Editor Module</span>
    </div>
    <div class="toolbar-group toolbar-tools">
      <button class="tool-btn" title="Select"><i class="fas fa-arrow-pointer"></i></button>
      <button class="tool-btn" title="Move"><i class="fas fa-arrows-up-down-left-right"></i></button>
      <div class="tool-divider"></div>
      <button class="tool-btn" title="Rectangle"><i class="fas fa-square"></i></button>
      <button class="tool-btn" title="Circle"><i class="fas fa-circle"></i></button>
      <button class="tool-btn" title="Line"><i class="fas fa-minus"></i></button>
      <div class="tool-divider"></div>
      <button class="tool-btn" title="Text"><i class="fas fa-font"></i></button>
    </div>
    <div class="toolbar-group">
      <span class="toolbar-status">
        <i class="fas fa-circle-dot" style="color:#10b981;font-size:0.6rem"></i>
        FocusedLayout · Full-Screen Mode
      </span>
    </div>
  </div>

  <!-- Canvas area -->
  <div class="editor-canvas" aria-label="Editor canvas">
    <div class="canvas-grid" aria-hidden="true"></div>
    <div class="canvas-placeholder">
      <i class="fas fa-vector-square"></i>
      <h2>Editor Canvas</h2>
      <p>Full-screen editor module · FocusedLayout active</p>
      <small>Use the Back → Shell button to return to the main navigation</small>
    </div>
  </div>

</div>
