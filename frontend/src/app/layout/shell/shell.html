<div class="layout" [class.collapsed]="collapsed">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-full">Kit Monitor</span>
      <span class="brand-short">KM</span>
      <button class="toggle-btn" (click)="toggle()" [attr.aria-label]="collapsed ? 'Expandir' : 'Colapsar'">
        <span class="chevron">{{ collapsed ? '&#9654;' : '&#9664;' }}</span>
      </button>
    </div>
    <nav>
      <!-- Dashboard -->
      <a routerLink="/monitor" routerLinkActive="active" class="nav-dashboard">
        <span class="nav-full">Monitor</span><span class="nav-short">MN</span>
      </a>

      <!-- Planeación -->
      <div class="nav-group" [class.open]="openSection === 'plan'">
        <button class="nav-group-header" (click)="toggleSection('plan')">
          <span class="nav-full">Planeacion</span><span class="nav-short">PL</span>
          <span class="nav-full group-arrow">{{ openSection === 'plan' ? '&#9650;' : '&#9660;' }}</span>
        </button>
        <div class="nav-group-items">
          <a routerLink="/plan" routerLinkActive="active">Publicacion</a>
          <a routerLink="/forecast" routerLinkActive="active">Pronostico</a>
        </div>
      </div>

      <!-- IC — Control de Inventarios -->
      <div class="nav-group" [class.open]="openSection === 'ic'">
        <button class="nav-group-header" (click)="toggleSection('ic')">
          <span class="nav-full">IC</span><span class="nav-short">IC</span>
          <span class="nav-full group-arrow">{{ openSection === 'ic' ? '&#9650;' : '&#9660;' }}</span>
        </button>
        <div class="nav-group-items">
          <a routerLink="/bom" routerLinkActive="active">BOM</a>
          <a routerLink="/kits" routerLinkActive="active">Kits</a>
          <a routerLink="/conteos" routerLinkActive="active">Conteos</a>
        </div>
      </div>

      <!-- IE — Ingeniería Industrial -->
      <div class="nav-group" [class.open]="openSection === 'ie'">
        <button class="nav-group-header" (click)="toggleSection('ie')">
          <span class="nav-full">IE</span><span class="nav-short">IE</span>
          <span class="nav-full group-arrow">{{ openSection === 'ie' ? '&#9650;' : '&#9660;' }}</span>
        </button>
        <div class="nav-group-items">
          <a class="disabled">Ayudas visuales</a>
          <a class="disabled">Disposicion</a>
        </div>
      </div>

      <!-- Producción -->
      <div class="nav-group" [class.open]="openSection === 'prod'">
        <button class="nav-group-header" (click)="toggleSection('prod')">
          <span class="nav-full">Produccion</span><span class="nav-short">PR</span>
          <span class="nav-full group-arrow">{{ openSection === 'prod' ? '&#9650;' : '&#9660;' }}</span>
        </button>
        <div class="nav-group-items">
          <a routerLink="/production" routerLinkActive="active">Solicitar kit</a>
          <a class="disabled">Hora por hora</a>
          <a class="disabled">Kit terminado</a>
        </div>
      </div>
    </nav>
    <button class="logout" (click)="logout()"><span class="nav-full">Cerrar sesion</span><span class="nav-short">X</span></button>
  </aside>
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
