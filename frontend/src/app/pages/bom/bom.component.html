<div class="page-header">
  <h2>BOM</h2>
  <button class="btn-primary" (click)="showForm = !showForm">
    {{ showForm ? 'Cancelar' : '+ Nuevo item' }}
  </button>
</div>

<div class="form-card" *ngIf="showForm">
  <h3>Agregar item al BOM</h3>
  <p *ngIf="formError" class="error">{{ formError }}</p>
  <form (ngSubmit)="submit()" #f="ngForm">
    <div class="form-row">
      <div class="field">
        <label>Modelo *</label>
        <input [(ngModel)]="form.model" name="model" required placeholder="CLIO-IV" />
      </div>
      <div class="field">
        <label>Número de parte *</label>
        <input [(ngModel)]="form.partNumber" name="partNumber" required placeholder="NP-001" />
      </div>
    </div>
    <div class="form-row">
      <div class="field flex-2">
        <label>Descripción</label>
        <input [(ngModel)]="form.description" name="description" placeholder="Tornillo M6..." />
      </div>
      <div class="field">
        <label>Factor de uso *</label>
        <input [(ngModel)]="form.usageFactor" name="usageFactor" type="number" min="0.001" step="0.001" required />
      </div>
      <div class="field">
        <label>Unidad</label>
        <select [(ngModel)]="form.unit" name="unit">
          <option>EA</option><option>KG</option><option>M</option><option>L</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn-primary" [disabled]="submitting || f.invalid">
      {{ submitting ? 'Guardando…' : 'Guardar item' }}
    </button>
  </form>
</div>

<div class="filter-row">
  <input [(ngModel)]="filterModel" placeholder="Filtrar por modelo…" class="filter-input" />
  <span class="count" *ngIf="filterModel">{{ filtered.length }} resultado(s)</span>
</div>

<p *ngIf="loading">Cargando…</p>
<p *ngIf="error" class="error">{{ error }}</p>

<table *ngIf="!loading && filtered.length > 0">
  <thead>
    <tr>
      <th>Modelo</th><th>N° Parte</th><th>Descripción</th>
      <th>Factor uso</th><th>Unidad</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of filtered">
      <td>{{ item.model }}</td>
      <td><code>{{ item.partNumber }}</code></td>
      <td>{{ item.description || '–' }}</td>
      <td>{{ item.usageFactor }}</td>
      <td>{{ item.unit }}</td>
    </tr>
  </tbody>
</table>

<p *ngIf="!loading && filtered.length === 0 && !error">Sin items en BOM.</p>
