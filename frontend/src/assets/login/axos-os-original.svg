<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-label="AXOS OS premium emblem">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5ebf3"/>
      <stop offset="22%" stop-color="#6c7787"/>
      <stop offset="52%" stop-color="#111b28"/>
      <stop offset="78%" stop-color="#a4adba"/>
      <stop offset="100%" stop-color="#1e2937"/>
    </linearGradient>
    <linearGradient id="darkBlade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111d"/>
      <stop offset="100%" stop-color="#1b3558"/>
    </linearGradient>
    <linearGradient id="lightBlade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5fb"/>
      <stop offset="100%" stop-color="#8c97a8"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <g transform="translate(280 60)" filter="url(#drop)">
    <polygon points="360,20 620,170 620,470 360,620 100,470 100,170" fill="none" stroke="url(#steel)" stroke-width="18"/>
    <polygon points="360,45 598,182 598,458 360,595 122,458 122,182" fill="none" stroke="rgba(220,228,237,0.45)" stroke-width="4"/>

    <polygon points="205,225 303,245 360,310 262,292" fill="url(#darkBlade)" stroke="#1b2432" stroke-width="3"/>
    <polygon points="515,225 417,245 360,310 458,292" fill="url(#lightBlade)" stroke="#1b2432" stroke-width="3"/>
    <polygon points="205,415 303,395 360,330 262,348" fill="url(#darkBlade)" stroke="#1b2432" stroke-width="3"/>
    <polygon points="515,415 417,395 360,330 458,348" fill="url(#lightBlade)" stroke="#1b2432" stroke-width="3"/>
  </g>

  <text x="640" y="860" text-anchor="middle" fill="#dce4f0" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="116" letter-spacing="22">AXOS OS</text>
</svg>
