<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" role="img" aria-label="AXOS OS">
  <defs>
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d3d8df"/>
      <stop offset="40%" stop-color="#4e5a69"/>
      <stop offset="75%" stop-color="#f0f3f7"/>
      <stop offset="100%" stop-color="#2e3742"/>
    </linearGradient>
    <linearGradient id="xDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1726"/>
      <stop offset="100%" stop-color="#1e3a63"/>
    </linearGradient>
    <linearGradient id="xLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fb"/>
      <stop offset="100%" stop-color="#778398"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#04070d" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g transform="translate(110 36)" filter="url(#softShadow)">
