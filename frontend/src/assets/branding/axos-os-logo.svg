    <polygon points="200,36 345,120 345,295 200,380 55,295 55,120" fill="none" stroke="rgba(227,232,239,0.55)" stroke-width="4" />

    <polygon points="110,136 176,150 207,183 141,170" fill="url(#xDark)" stroke="#111826" stroke-width="2"/>
    <polygon points="290,136 224,150 193,183 259,170" fill="url(#xLight)" stroke="#111826" stroke-width="2"/>
    <polygon points="110,278 176,264 207,231 141,244" fill="url(#xDark)" stroke="#111826" stroke-width="2"/>
    <polygon points="290,278 224,264 193,231 259,244" fill="url(#xLight)" stroke="#111826" stroke-width="2"/>
  </g>

  <g transform="translate(122 464)">
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="56" letter-spacing="18" fill="#dce4ef">AXOS OS</text>
  </g>
