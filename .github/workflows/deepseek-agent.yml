name: DeepSeek Cloud Agent

# Se dispara cuando alguien comenta en un issue o PR.
# Solo actúa si el comentario contiene "/deepseek" Y lo escribe alguien
# con acceso de escritura al repo (dueño, miembro o colaborador).
on:
  issue_comment:
    types: [created]

jobs:
  deepseek-edit:
    # Guard de seguridad: ignora comentarios de cualquiera que no tenga
    # permiso de escritura. Sin esto, un extraño podría disparar cambios.
    if: >
      contains(github.event.comment.body, '/deepseek') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Reaccionar al comentario (ojos)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r .github/scripts/requirements.txt

      - name: Ejecutar agente DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/deepseek_agent.py
